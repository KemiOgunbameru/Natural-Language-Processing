# ============================================================
# Assignment 3 — Sequential Instruction Tuning Configuration
# ============================================================

# --- Model ---
student_model: "microsoft/Phi-3.5-mini-instruct"
teacher_model: "meta-llama/Llama-3.1-70B-Instruct"   # For imitation learning data generation
judge_model:   "meta-llama/Llama-3.1-70B-Instruct"   # For evaluation

# Teacher/Judge API (Together AI, vLLM, or local HF path)
# Set TEACHER_API_KEY and TEACHER_API_BASE as env vars OR use local_model_path
teacher_api_base: "https://api.together.xyz/v1"       # Together AI endpoint (set TOGETHER_API_KEY)
teacher_local_path: ""                                 # Leave empty to use API; set to HPC model path if local

# --- QLoRA Parameters ---
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["qkv_proj", "o_proj", "gate_up_proj", "down_proj"]
  bias: "none"
  task_type: "CAUSAL_LM"

# --- Training ---
training:
  precision: "4bit"           # 4-bit quantization (QLoRA)
  max_seq_length: 2048
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4   # effective batch = 16
  warmup_ratio: 0.03
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  dataloader_num_workers: 2

  stage1:
    epochs: 3
    learning_rate: 2.0e-5
    output_dir: "outputs/checkpoint1"
    dataset_path: "data/alpaca_train.jsonl"

  stage2:
    epochs: 2
    learning_rate: 2.0e-5
    output_dir: "outputs/checkpoint2"
    dataset_path: "data/json_instruct_train.jsonl"
    load_from: "outputs/checkpoint1"   # Start from Stage 1 checkpoint

# --- Data ---
data:
  alpaca_source: "tatsu-lab/alpaca"          # HuggingFace dataset
  alpaca_train_size: 10000
  alpaca_eval_size: 200                      # held-out eval set

  json_instruct_train_size: 1000             # teacher-generated examples
  json_instruct_eval_size: 100              # held-out JSON eval set
  json_task_types:
    - json_extraction
    - schema_constrained
    - classification
    - json_repair
    - tool_call
  examples_per_task: 220                    # generate more, validate, keep top N

# --- Evaluation ---
evaluation:
  alpaca_eval_prompts: 100                  # pairwise judge comparisons
  json_eval_prompts: 100                    # JSON benchmark prompts
  judge_temperature: 0.0
  judge_max_tokens: 1024
  judge_swap_order: true                    # randomise A/B to reduce position bias
  inference_max_new_tokens: 512
  inference_temperature: 0.1
  inference_do_sample: false

# --- Paths ---
paths:
  prompts_dir: "prompts"
  logs_dir: "logs"
  outputs_dir: "outputs"
  checkpoint0_dir: "outputs/checkpoint0"
  checkpoint1_dir: "outputs/checkpoint1"
  checkpoint2_dir: "outputs/checkpoint2"
